kind = "web"
previewPath = "/"
title = "DSA Interview Dashboard"
version = "1.0.0"
id = "artifacts/dsa-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21745

[services.development]
run = "pnpm --filter @workspace/dsa-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dsa-dashboard", "run", "build" ]
publicDir = "artifacts/dsa-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21745"
BASE_PATH = "/"
